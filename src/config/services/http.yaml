# config/services/http.yaml
# Controllers y servicios HTTP

services:
  # =============================================
  # Controllers
  # =============================================

  http.controller.instance:
    class: '../../infrastructure/http/controllers/InstanceController'
    arguments:
      - '@infrastructure.repository.whatsapp_instance'
      - '@infrastructure.baileys.connection_manager'
      - '@shared.logger'
    public: true

  http.controller.message:
    class: '../../infrastructure/http/controllers/MessageController'
    arguments:
      - '@infrastructure.repository.whatsapp_instance'
      - '@infrastructure.baileys.connection_manager'
      - '@shared.logger'
    public: true

  http.controller.group:
    class: '../../infrastructure/http/controllers/GroupController'
    arguments:
      - '@infrastructure.repository.whatsapp_instance'
      - '@infrastructure.baileys.connection_manager'
      - '@shared.logger'
    public: true

  http.controller.multimedia:
    class: '../../infrastructure/http/controllers/MultimediaController'
    arguments:
      - '@infrastructure.repository.whatsapp_instance'
      - '@infrastructure.baileys.connection_manager'
      - '@shared.logger'
    public: true

  http.controller.qr_view:
    class: '../../infrastructure/http/controllers/QRViewController'
    arguments:
      - '@infrastructure.repository.whatsapp_instance'
      - '@shared.logger'
    public: true

